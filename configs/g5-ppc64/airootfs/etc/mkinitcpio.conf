# mkinitcpio.conf for PowerMac G5
# autodetect is removed because the image is built in Docker/QEMU where
# no real hardware is detected — without this, USB and storage modules
# would be missing from the initramfs.
# Uses udev (not systemd) and no kms to keep the initramfs lean.

MODULES=()
BINARIES=()
FILES=()
HOOKS=(base udev modconf block filesystems keyboard fsck)
COMPRESSION="zstd"
